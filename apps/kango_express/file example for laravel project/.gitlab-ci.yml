variables:
  # domain/project-registry/project-gitlab:tag_commit
  # ví dụ: registry.gitlab.com/kango-express/kango_express:v1.0.0_ksic2d3k
  FULL_IMAGE_NAME: "${REGISTRY_URL}/${REGISTRY_PROJECT}/${CI_PROJECT_NAME}:${CI_COMMIT_TAG}_${CI_COMMIT_SHORT_SHA}"

stages:
  - build_and_push
  - deploy
  - checklog


# ## keywords:
# ## - branch pipeline: Là pipeline được kích hoạt khi có push hoặc merge vào một nhánh cụ thể (ví dụ: main, develop). Các job trong pipeline này sẽ chỉ chạy khi có sự kiện liên quan đến nhánh đó.
# ## - tag pipeline: Là pipeline được kích hoạt khi có push hoặc merge vào một tag cụ thể (ví dụ: v1.0.0). Các job trong pipeline này sẽ chỉ chạy khi có sự kiện liên quan đến tag đó.



# =============================== PROD BUILD========================================
build-and-push-prod-job:
  stage: build_and_push
  variables:
    GIT_STRATEGY: clone
  before_script:  
    - docker login ${REGISTRY_URL} -u ${REGISTRY_USER} -p ${REGISTRY_PASSWORD}
  script:
    docker build -t $FULL_IMAGE_NAME .
    docker push $FULL_IMAGE_NAME
  rules:        
    # ## job chạy khi tạo tag mới bắt đầu bằng "v" (tag pipeline)
    - if: '$CI_COMMIT_TAG =~ /^v/'
    # ## job chạy khi có push hoặc merge vào nhánh main (branch pipeline)
    # - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - gitlab-runner-kango


deploy-prod-job:
  stage: deploy
  variables:
    GIT_STRATEGY: none
  when: manual
  before_script:  
    - apk add --no-cache openssh-client

    # SSH key
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    # Known hosts
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:    
    - |
      ssh $SERVER_USER@$SERVER_HOST "
        docker login $REGISTRY_URL \
          -u $REGISTRY_USER \
          -p $REGISTRY_PASSWORD &&
        cd /var/www/kango_express &&
        docker pull $FULL_IMAGE_NAME &&
        export IMAGE_NAME=$FULL_IMAGE_NAME &&
        docker compose up -d
      "
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    # - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - gitlab-runner-kango


checklog-prod-job:
  stage: checklog
  variables:
    GIT_STRATEGY: none
  when: manual
  script:
    - echo "Checking production logs..."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - when: never
    # - if: $CI_COMMIT_BRANCH == "main"
    # - when: never
  tags:
    - gitlab-runner-kango



# ================================ DEV BUILD========================================
build-dev-job:
  stage: build_and_push
  variables:
    GIT_STRATEGY: clone
  script:
    - echo "Building..."
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - gitlab-runner-kango


deploy-dev-job:
  stage: deploy
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Deploying..."
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - gitlab-runner-kango


checklog-dev-job:
  stage: checklog
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Checking development logs..."
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - gitlab-runner-kango

