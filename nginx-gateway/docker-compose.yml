services:

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_gateway
    restart: unless-stopped

    ports:
      - 80:80
      - 443:443

    volumes:
      - ./log/:/var/log/nginx/
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
      - ./html:/etc/nginx/html

    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
